<!-- ============================================================
     OG / SOCIAL META SPEC (Story 3.8 — for Nuxt useHead in real build)
     The prototype is a single-file HTML so all routes share these tags.
     In the real Vue/Nuxt app, each event + athlete page sets its own
     og:title / og:image / og:description via useHead() in the route component.
     Engineering: see Story 3.8 ACs for per-route requirements.
     ============================================================ -->

<meta property="og:site_name" content="HALO" />
<meta property="og:title" content="HALO — Live youth basketball, your highlights" />
<meta property="og:description" content="Auto-clipped basketball highlights for players, parents, and coaches. Watch your moments and your team's drops." />
<meta property="og:url" content="https://yonipixellot.github.io/halo-preview/" />
<meta property="og:image" content="https://yonipixellot.github.io/halo-preview/og-default.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="HALO — Live youth basketball, your highlights" />
<meta name="twitter:description" content="Auto-clipped basketball highlights for players, parents, and coaches." />

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  #root { min-height: 100vh; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace; }
  .phone {
    width: 393px; height: 852px;
    border: 2px solid #000;
    border-radius: 44px;
    background: #fff;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.15);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .phone-screen { position: absolute; inset: 0; overflow: hidden; }
  .scroll-area { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .scroll-area::-webkit-scrollbar { width: 0; display: none; }
  .notch { display: none; }
  .hatch { background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.04) 0, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 6px); }
  .hatch-dark { background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.06) 0, rgba(255,255,255,0.06) 1px, transparent 1px, transparent 6px); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  @keyframes ping { 0%{transform:scale(1);opacity:1} 75%,100%{transform:scale(2.4);opacity:0} }
  @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

const fmt = {
  countdown(sec) {
    const s = Math.max(0, sec);
    const h = Math.floor(s / 3600);
    const m = Math.floor(s % 3600 / 60);
    const ss = s % 60;
    if (h > 0) return `${h}h ${String(m).padStart(2, '0')}m`;
    return `${String(m).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
  },
  ago(sec) {
    const a = Math.abs(sec);
    if (a < 3600) return `${Math.round(a / 60)}m ago`;
    if (a < 86400) return `${Math.round(a / 3600)}h ago`;
    if (a < 86400 * 2) return 'yesterday';
    return `${Math.round(a / 86400)}d ago`;
  },
  dur(sec) {
    return `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, '0')}`;
  }
};

function appReducer(s, action) {
  switch (action.type) {
    case 'SET_PERSONA':
      return {
        ...s,
        persona: action.persona,
        tab: 'home',
        pushed: []
      };
    case 'SET_TAB':
      return {
        ...s,
        tab: action.tab,
        pushed: []
      };
    case 'PUSH':
      return {
        ...s,
        pushed: [...s.pushed, action.screen]
      };
    case 'POP':
      return {
        ...s,
        pushed: s.pushed.slice(0, -1)
      };
    case 'OPEN_HIGHLIGHTS':
      return {
        ...s,
        highlightViewer: {
          ids: action.ids,
          index: action.index ?? 0
        }
      };
    case 'CLOSE_HIGHLIGHTS':
      return {
        ...s,
        highlightViewer: null
      };
    case 'OPEN_CLIPPER':
      return {
        ...s,
        clipper: action.payload
      };
    case 'CLOSE_CLIPPER':
      return {
        ...s,
        clipper: null
      };
    case 'PACK_REVEAL':
      return {
        ...s,
        packReveal: action.gameId
      };
    case 'PACK_DISMISS':
      return {
        ...s,
        packReveal: null,
        gameStateOverride: 'none'
      };
    case 'TOAST':
      return {
        ...s,
        toast: action.toast
      };
    case 'CLEAR_TOAST':
      return {
        ...s,
        toast: null
      };
    case 'SET_EXPANDED_CHAPTER':
      return {
        ...s,
        expandedChapter: s.expandedChapter === action.id ? null : action.id
      };
    case 'SET_EXPANDED_DROP':
      return {
        ...s,
        expandedDropGame: s.expandedDropGame === action.id ? null : action.id
      };
    case 'SET_GAME_STATE':
      return {
        ...s,
        gameStateOverride: action.state
      };
    case 'SET_WATCH_QUERY':
      return {
        ...s,
        watchSearchQuery: action.q
      };
    case 'SET_WATCH_FILTER':
      return {
        ...s,
        watchFilter: action.f
      };
    case 'SET_PBP_FILTER':
      return {
        ...s,
        pbpFilter: action.f
      };
    case 'TOGGLE_NOTIFY_PLAYER':
      return {
        ...s,
        notifyPerPlayer: {
          ...s.notifyPerPlayer,
          [action.id]: !s.notifyPerPlayer[action.id]
        }
      };
    case 'GRANT_NOTIF':
      return {
        ...s,
        notifPermissionGranted: true,
        notifPermissionAsked: true
      };
    case 'ASK_NOTIF_PERMISSION':
      return {
        ...s,
        notifPermissionAsked: true
      };
    case 'SET_FOLLOWED_TEAMS':
      return {
        ...s,
        followedTeams: action.ids
      };
    case 'SET_FOLLOWED_PLAYERS':
      return {
        ...s,
        followedPlayers: action.ids
      };
    case 'RESET_ONBOARDING':
      return {
        ...initialState,
        onboarded: false,
        persona: action.persona || 'parent',
        onboardStep: action.step || 'persona',
        followedTeams: [],
        followedPlayers: [],
        notifyPerPlayer: {}
      };
    case 'COMPLETE_ONBOARDING':
      return {
        ...s,
        onboarded: true,
        tab: 'home'
      };
    case 'SET_ONBOARD_STEP':
      return {
        ...s,
        onboardStep: action.step
      };
    case 'SET_JERSEY_COLOR':
      return {
        ...s,
        jerseyColor: action.color
      };
    case 'SET_IDENTITY_STATE':
      return {
        ...s,
        identityState: action.state
      };
    case 'SET_WATCH_CATEGORY':
      return {
        ...s,
        watchCategory: action.f
      };
    case 'SET_WATCH_CLIENT':
      return {
        ...s,
        watchClient: action.id,
        watchDivision: null
      };
    case 'SET_WATCH_DIVISION':
      return {
        ...s,
        watchDivision: s.watchDivision === action.id ? null : action.id
      };
    case 'SET_AUTH_STEP':
      return {
        ...s,
        authStep: action.step,
        authEmail: action.email || s.authEmail
      };
    case 'SET_PENDING_AUTH_INTENT':
      return { ...s, pendingAuthIntent: action.intent };
    case 'CLEAR_PENDING_AUTH_INTENT':
      return { ...s, pendingAuthIntent: null };
    case 'SET_HL_VIEW_MODE':
      return { ...s, hlViewMode: action.mode };
    case 'SET_EMAIL_VERIFIED':
      return { ...s, emailVerified: action.verified };
    case 'SIGN_IN': {
      // If we have a pending intent (guest → registered), restore screen + apply it
      const intent = s.pendingAuthIntent;
      const restoredPushed = intent?.returnScreen ? [intent.returnScreen] : [];
      const restoredFollowedPlayers = intent?.action === 'follow_player'
        ? [...new Set([...s.followedPlayers, intent.payload?.id].filter(Boolean))]
        : s.followedPlayers;
      const restoredFollowedTeams = intent?.action === 'follow_team'
        ? [...new Set([...s.followedTeams, intent.payload?.id].filter(Boolean))]
        : s.followedTeams;
      return {
        ...s,
        authed: true,
        authStep: 'signin',
        persona: action.persona || s.persona,
        onboarded: true,
        tab: 'home',
        pushed: restoredPushed,
        followedPlayers: restoredFollowedPlayers,
        followedTeams: restoredFollowedTeams,
        pendingAuthIntent: null,
        toast: intent ? { msg: `Welcome back · ${intent.label} restored` } : s.toast
      };
    }
    case 'SIGN_UP': {
      const intent = s.pendingAuthIntent;
      // If guest is upgrading with a pending intent, skip onboarding and restore the screen
      const skipOnboarding = !!intent;
      const restoredPushed = intent?.returnScreen ? [intent.returnScreen] : [];
      const restoredFollowedPlayers = intent?.action === 'follow_player'
        ? [...new Set([...s.followedPlayers, intent.payload?.id].filter(Boolean))]
        : s.followedPlayers;
      const restoredFollowedTeams = intent?.action === 'follow_team'
        ? [...new Set([...s.followedTeams, intent.payload?.id].filter(Boolean))]
        : s.followedTeams;
      return {
        ...s,
        authed: true,
        authStep: 'signin',
        onboarded: skipOnboarding,
        onboardStep: 'persona',
        tab: 'home',
        pushed: restoredPushed,
        followedPlayers: restoredFollowedPlayers,
        followedTeams: restoredFollowedTeams,
        pendingAuthIntent: null,
        toast: intent ? { msg: `Account created · ${intent.label} applied` } : s.toast
      };
    }
    case 'CONTINUE_AS_GUEST':
      return {
        ...s,
        authed: true,
        persona: 'guest',
        onboarded: true,
        followedTeams: [],
        followedPlayers: [],
        tab: 'home',
        pushed: []
      };
    case 'SIGN_OUT':
      return {
        ...initialState,
        authed: false,
        authStep: 'signin'
      };
    case 'OPEN_SIDE_MENU':
      return {
        ...s,
        sideMenuOpen: true
      };
    case 'CLOSE_SIDE_MENU':
      return {
        ...s,
        sideMenuOpen: false
      };
    case 'SET_LANGUAGE':
      return {
        ...s,
        language: action.lang
      };
    case 'MARK_REVEALED':
      return {
        ...s,
        revealedGames: {
          ...s.revealedGames,
          [action.gameId]: true
        }
      };
    case 'PUSH_REVEAL_FIRE':
      return {
        ...s,
        pendingPushReveal: action.gameId,
        packReveal: action.gameId
      };
    case 'RESET_REVEALS':
      return {
        ...s,
        revealedGames: {},
        pendingPushReveal: null
      };
    case 'SET_ERROR_STATE':
      return {
        ...s,
        errorState: action.state
      };
    case 'TOGGLE_DEMO_MODE':
      return {
        ...s,
        feedDemoMode: !s.feedDemoMode
      };
    default:
      return s;
  }
}
